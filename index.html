<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ScreenCleanLock</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace;
  }
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .label {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #666;
    margin: 0 0 1.75rem;
  }
  #lockButton {
    display: flex;
    align-items: center;
    gap: 0.6em;
    font: inherit;
    font-size: 0.95rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.9em 1.7em;
    border-radius: 4px;
    border: 1px solid #444;
    background: transparent;
    color: #e8e8e8;
    cursor: pointer;
    transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  #lockButton svg {
    width: 15px;
    height: 15px;
  }
  #lockButton:hover {
    background: #e8e8e8;
    color: #0a0a0a;
    border-color: #e8e8e8;
  }
  #lockButton:active {
    background: #aaa;
    border-color: #aaa;
  }
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    background: #000;
    z-index: 999999;
    cursor: none;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }
  #overlay.active {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }
  #overlay-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 3rem;
  }
  #overlay p {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #3a3a3a;
    margin: 0;
    animation: breathe 3s ease-in-out infinite;
  }
  #holdTimer {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    color: #999;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 0.35em 0.9em;
    min-width: 4.5em;
    text-align: center;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  #holdTimer.active {
    opacity: 1;
    transform: translateY(0);
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
  <main>
    <p class="label">screen &amp; keyboard lock</p>
    <button id="lockButton">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="11" width="16" height="10" rx="1.5"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      Lock
    </button>
  </main>
  <div id="overlay">
    <div id="overlay-content">
      <div id="holdTimer"></div>
      <p>hold space · 2s · unlock</p>
    </div>
  </div>
  <script type="module" src="./app.mjs"></script>
</body>
</html>
